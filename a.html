<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f2f5f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:#fff;
            width:350px;
            padding:35px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .input-box{
            margin-bottom:18px;
        }

        .input-box label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#555;
        }

        .input-box input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        .input-box input:focus{
            outline:none;
            border-color:#007BFF;
        }

        .options{
            display:flex;
            justify-content:space-between;
            align-items:center;
            font-size:14px;
            margin-bottom:20px;
        }

        .options a{
            text-decoration:none;
            color:#007BFF;
        }

        .options a:hover{
            text-decoration:underline;
        }

        button{
            width:100%;
            padding:12px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .signup{
            text-align:center;
            margin-top:20px;
            font-size:14px;
        }

        .signup a{
            color:#007BFF;
            text-decoration:none;
        }

        .signup a:hover{
            text-decoration:underline;
        }
    </style>

</head>
<body>

<div class="login-box">

    <h2>Login</h2>

    <form>

        <div class="input-box">
            <label>Username</label>
            <input type="text" placeholder="Enter Username" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox"> Remember Me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="signup">
        Don't have an account?
        <a href="#">Sign Up</a>
    </div>

</div>

</body>
</html>
